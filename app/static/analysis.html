<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Telemetry — Analysis</title>
<link rel="icon" type="image/png" href="img/logo.png">
<link rel="stylesheet" href="css/uplot.min.css">
<link rel="stylesheet" href="css/fonts.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="app-body">

<aside class="app-sidebar">
  <div class="sidebar-top">
    <div class="sidebar-icon brand-icon" title="Telemetry System">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    </div>
    <a href="index.html" class="sidebar-icon" title="Live Dashboard">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
    </a>
    <a href="analysis.html" class="sidebar-icon active" title="Session Analysis">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </a>
    <a href="index.html#livemap" class="sidebar-icon" title="Circuit Map">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
    </a>
  </div>
  <div class="sidebar-bottom">
    <div class="sidebar-status-dot"></div>
    <div id="sidebar-settings-btn" class="sidebar-icon clickable" title="Settings" aria-label="Settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </div>
  </div>
</aside>

<div class="app-main">
  <header>
    <nav class="top-nav">
      <a href="index.html">LIVE DATA</a>
      <a class="active" href="analysis.html">SESSION</a>
      <a class="active" href="analysis.html">HISTORY</a>
      <a href="javascript:void(0)" onclick="openSettings()">SETUP</a>
    </nav>

    <div class="header-right">
      <div class="sys-status">
        <span class="sys-dot"></span>
        <span class="sys-text">SYSTEM OK</span>
        <span class="sys-sub">V-SYNC ACTIVE</span>
      </div>
      <div class="chip" id="hint">pick a session, then tag laps to compare</div>
      <div id="settings-btn" class="chip clickable" title="Settings" aria-label="Settings">⚙ SETTINGS</div>
    </div>
  </header>

  <div class="analysis-layout">
    <aside class="sidebar">
      <div class="sidebar-actions">
        <button id="btn-import" title="Import a CSV export — rebuilds the session (laps, charts, map) from the file">Import CSV</button>
        <input type="file" id="import-file" accept=".csv,text/csv" hidden>
      </div>
      <div id="session-list"><div class="empty-hint">loading…</div></div>
    </aside>

    <div class="detail" id="detail">
      <div class="empty-hint">No session selected. Drive with Data Out enabled (or run the
        simulator) and sessions will appear on the left.</div>
    </div>
  </div>
</div>

<template id="detail-template">
  <div>
    <div class="detail-header">
      <h1 id="session-title"></h1>
      <span id="header-badges"></span>
      <select id="track-select" title="Track type">
        <option value="">— race type —</option>
        <option value="road">🛣️ Road</option>
        <option value="street">🏙️ Street</option>
        <option value="touge">⛰️ Touge</option>
        <option value="dirt">🟫 Dirt</option>
        <option value="cross">🏞️ Cross-Country</option>
        <option value="drag">🏁 Drag</option>
        <option value="wtc">⏱️ WTC</option>
      </select>
      <select id="cond-select" title="Track conditions">
        <option value="">— conditions —</option>
        <option value="dry">☀️ Dry</option>
        <option value="wet">🌧️ Wet</option>
        <option value="snow">❄️ Snow</option>
      </select>
      <button id="btn-rename">Rename</button>
      <button id="btn-route">Name route</button>
      <button id="btn-car">Name car</button>
      <button id="btn-reprocess" title="Re-run lap detection over the stored telemetry (manual edits are kept)">Reprocess</button>
      <button id="btn-reset-edits" style="display:none" title="Remove every manual edit — dismissed contacts, flag overrides, excluded laps">Reset edits</button>
      <button id="btn-export" title="Download the whole session as CSV — full-rate telemetry, one lap column (excluded laps are skipped)">Export CSV</button>
      <button id="btn-delete" class="danger">Delete</button>
    </div>
    <div class="car-line" id="header-car"></div>
    <section class="panel">
      <h2><span class="bar-accent">▌</span> Laps</h2>
      <table class="laps">
        <thead><tr><th>Compare</th><th>Lap</th><th>Time</th><th>Gap</th><th></th><th></th></tr></thead>
        <tbody id="lap-rows"></tbody>
      </table>
    </section>
    <div id="cmp-tray" class="cmp-tray" style="display:none"></div>
    <section class="panel">
      <h2><span class="bar-accent">▌</span> Track map</h2>
      <div class="map-row">
        <div>
          <canvas id="trackmap"></canvas>
          <div class="legend">
            <span class="seg" id="map-mode">
              <button data-mode="2d">2D</button><button data-mode="3d">3D</button>
            </span>
            <span id="color-wrap">Color:
              <select id="color-mode">
                <option value="speed">speed</option>
                <option value="slip">tire slip</option>
              </select>
            </span>
            <button id="btn-map-png" title="Save the map as it is drawn — a shareable PNG with a title / car / lap-time caption">Save PNG</button>
            <span id="legend-scale"></span>
            <span><span class="swatch" style="background:#34d399"></span> start</span>
            <span title="contact spike (wall / obstacle) — right-click one to dismiss a wrong detection"><span style="color:#ef4444">✦</span> contact (right-click to dismiss)</span>
            <span title="jump: takeoff ○ to touchdown ▸ — a ring marks a hard landing"><span style="color:#f59e0b">○⇢</span> jump</span>
            <span>⌖ hover a chart to mark that spot · click to pin it · drag to zoom + highlight this span</span>
            <span id="map-hint" style="display:none">↔ drag the map to rotate</span>
          </div>
        </div>
        <div id="map-side" class="empty-hint">Tag a lap to draw its racing line — add more to overlay them.</div>
      </div>
    </section>
    <section class="panel">
      <h2><span class="bar-accent">▌</span> Lap comparison <span id="cmp-label" style="text-transform:none"></span></h2>
      <div class="charts" id="charts"><div class="empty-hint">Tag laps in the table above (or ＋ on a session card) to compare.</div></div>
    </section>
    <section class="panel" id="raw-section" style="display:none">
      <h2><span class="bar-accent">▌</span> Raw data at cursor <span id="raw-pos" style="text-transform:none"></span></h2>
      <p class="raw-hint">Hover a comparison chart — every packet channel at that spot, per picked lap,
        in game-native units. Click a chart to pin a spot: values return to it whenever the
        cursor leaves the charts (click it again, or double-click, to unpin). Without a pin,
        values stay at the last hovered position.</p>
      <div class="raw-table" id="raw-table"></div>
    </section>
  </div>
</template>

<script src="js/vendor/uplot.iife.min.js"></script>
<script src="js/common.js"></script>
<script src="js/settings.js"></script>
<script src="js/analysis.js"></script>
<script>
  document.getElementById("sidebar-settings-btn")?.addEventListener("click", openSettings);
</script>
</body>
</html>
