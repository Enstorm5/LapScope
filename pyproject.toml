# Test + lint configuration. There is no build/packaging step here — the app
# runs from source (Docker) and the frontend has no bundler on purpose.

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
# vendored third-party assets are not ours to lint
extend-exclude = ["app/static/js/vendor"]

[tool.ruff.lint]
# ruff's defaults (pyflakes F + a safe pycodestyle subset E4/E7/E9): catches
# real errors — undefined names, unused imports, bad syntax — not style nits.
select = ["E4", "E7", "E9", "F"]
